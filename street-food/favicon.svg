<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="ocean" cx="38%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#fdfcf9"/>
      <stop offset="100%" stop-color="#f0ede5"/>
    </radialGradient>
    <clipPath id="globe">
      <circle cx="16" cy="16" r="15"/>
    </clipPath>
  </defs>
  <!-- sphere, filling the canvas -->
  <circle cx="16" cy="16" r="15" fill="url(#ocean)"/>
  <!-- graticule: 3 meridians + 3 latitudes, clipped to the sphere -->
  <g clip-path="url(#globe)" fill="none" stroke="#1f3a5f" stroke-width="1.2" opacity="0.7">
    <!-- meridians -->
    <line x1="16" y1="1" x2="16" y2="31"/>
    <ellipse cx="16" cy="16" rx="7.4" ry="15"/>
    <!-- latitudes -->
    <line x1="1" y1="16" x2="31" y2="16"/>
    <ellipse cx="16" cy="16" rx="15" ry="7.4"/>
  </g>
  <!-- bold sphere edge -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="#1f3a5f" stroke-width="2"/>
  <!-- location marker at a graticule crossing, on a clear halo -->
  <circle cx="21.2" cy="10.8" r="4.6" fill="url(#ocean)"/>
  <circle cx="21.2" cy="10.8" r="3.4" fill="#1f3a5f"/>
  <circle cx="21.2" cy="10.8" r="1.3" fill="#fdfcf9"/>
</svg>
